# File: config.yaml
# Version: 1.14.0
# Last Updated: 2026-02-27 21:45 CET
# Description: sdproxy Simple DNS Proxy Configuration (Ultra-Low Memory Profile)
# Added: domain_routes for high-performance suffix-based routing to specific upstreams.

server:
  listen_udp: ["0.0.0.0:53", "127.0.0.1:5353"]
  listen_tcp: ["0.0.0.0:53"]
  listen_dot: ["0.0.0.0:853"]
  listen_doh: ["0.0.0.0:443"]   
  listen_doq: ["0.0.0.0:853"]   
  
  udp_workers: 10
  
  tls_cert: ""
  tls_key: ""

  ddr:
    enabled: true
    hostnames: ["dns.local.net", "doh.local.net"]
    ipv4: "192.168.1.100"
    ipv6: ""

logging:
  strip_time: false

cache:
  enabled: true
  size: 1024         
  min_ttl: 60         

# IDENTITY RESOLUTION: Automatically extract names for {client-name} substitution
identity:
  hosts_files: ["/etc/hosts"]
  # Point to your dnsmasq lease file (e.g., OpenWrt, Pi-hole, generic Linux)
  dnsmasq_leases: ["/tmp/dhcp.leases", "/var/lib/misc/dnsmasq.leases"]

upstreams:
  default:
    - "udp://1.1.1.1:53"
    - "doh://cloudflare-dns.com/dns-query#1.1.1.1,1.0.0.1"
  kids:
    - "tcp://1.1.1.3:53"
    - "doh://doh.controld.com/{client-name}"
  secure:
    - "dot://dns.quad9.net:853#9.9.9.9,149.112.112.112"
    - "doh3://security.cloudflare-dns.com/dns-query#1.1.1.2,1.0.0.2"
  # Define your local upstream here (e.g., your router or local AD controller)
  local_network:
    - "udp://192.168.1.1:53"

routes:
  # Explicit mapping overrides dynamic identity resolution based on MAC Address
  "00:11:22:33:44:55":
    upstream: "kids"
    client_name: "kids-ipad-override"

domain_routes:
  # High-performance suffix matching. 
  # If the requested domain ends in any of these, it forcefully overrides the client upstream.
  "lan": "local_network"
  "local": "local_network"
  "home.arpa": "local_network"
  "corp.internal": "local_network"

