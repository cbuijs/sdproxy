# File: full_reference_config.yaml
# Version: 1.24.0
# Last Updated: 2026-03-09 16:00 CET
# Description: sdproxy full reference configuration — Simple DNS Proxy.
#              Every option is documented inline. No separate manual needed.
#
# Changes:
#   1.24.0 - Added bootstrap_servers global option.
#   1.23.0 - Added domain_policy section with IETF-reserved TLD examples.
#   1.22.0 - Added cache.max_ttl option.
#   1.21.0 - Added logging.log_queries option.
#   1.20.0 - Added identity.poll_interval option.
#   1.19.0 - Added flatten_cname and minimize_answer options.
#   1.18.0 - Added strict_ptr option.
#   1.17.0 - Added filter_aaaa option.
#   1.16.0 - Added memory_limit_mb option. DDR ports derived from listeners.
#   1.15.0 - Added domain_routes section.
#   1.14.0 - Added identity section.

server:
  # Listener addresses. Multiple addresses supported per protocol.
  # Omit any section to disable that protocol entirely.
  listen_udp: ["0.0.0.0:53", "127.0.0.1:5353"]
  listen_tcp: ["0.0.0.0:53"]
  listen_dot: ["0.0.0.0:853"]
  listen_doh: ["0.0.0.0:443"]   # Serves HTTP/1.1, HTTP/2, and HTTP/3 (QUIC)
  listen_doq: ["0.0.0.0:853"]   # DNS over QUIC — RFC 9250

  # Number of goroutines in the UDP worker pool.
  udp_workers: 10

  # TLS certificate and key for DoT, DoH, and DoQ listeners.
  # Leave both empty to auto-generate an ephemeral self-signed certificate.
  tls_cert: ""
  tls_key: ""

  # Hard memory ceiling for the Go runtime via debug.SetMemoryLimit.
  # 0 = disabled (default).
  memory_limit_mb: 0

  # Filter all AAAA (IPv6) queries by returning an empty NOERROR response.
  # false = disabled (default).
  filter_aaaa: false

  # Strict PTR validation — reject PTR queries that are not valid reverse-lookup
  # addresses. Valid forms: *.in-addr.arpa (IPv4) and *.ip6.arpa (IPv6).
  # false = disabled (default).
  strict_ptr: false

  # CNAME flattening — collapse CNAME chains in A/AAAA responses.
  # false = disabled (default).
  flatten_cname: false

  # Answer minimization — strip authority (NS) and additional sections.
  # false = disabled (default).
  minimize_answer: false

  # Discovery of Designated Resolvers (DDR) — RFC 9462.
  # When enabled, sdproxy intercepts _dns.resolver.arpa SVCB queries and
  # responds with SVCB records advertising its own encrypted DNS endpoints.
  # Also spoofs A/AAAA/HTTPS lookups for the configured hostnames.
  # When DISABLED, _dns.resolver.arpa queries and DDR hostname queries are
  # forwarded to the upstream like any other query — no interception at all.
  ddr:
    enabled: true
    hostnames: ["dns.local.net", "doh.local.net"]
    ipv4: ["192.168.1.1"]   # Leave empty to use the incoming interface address
    ipv6: []

  # Staggered parallel upstream queries — eliminates "context deadline exceeded".
  # 0 = sequential (default). Recommended: 150 for 2-3 upstreams on a home network.
  upstream_stagger_ms: 150

  # Global bootstrap DNS servers — plain UDP/TCP resolvers used to resolve
  # upstream hostnames that have no per-URL bootstrap IPs (the #ip1,ip2 syntax).
  #
  # Format: bare IP address or IP:port. Only IP addresses are accepted here —
  # no hostnames (chicken-and-egg). Port defaults to 53 when omitted.
  #
  # Resolution order:
  #   1. Per-URL bootstrap IPs in the upstream URL  (e.g. "doh://host/path#1.1.1.1")
  #      — always take precedence over global servers.
  #   2. Global bootstrap_servers (this list) — used when no per-URL IPs are set
  #      and the hostname is not already a bare IP.
  #   3. OS resolver (fallback) — used when both of the above are absent.
  #
  # When bootstrap_servers is empty (default), upstreams without per-URL IPs
  # must use bare IP addresses in their URLs, or rely on the OS resolver
  # being functional at startup (which is not guaranteed on many routers).
  #
  # Typical home-router setup — point at your ISP or a well-known resolver:
  #   bootstrap_servers: ["1.1.1.1", "9.9.9.9"]
  #
  # {client-name} is a LOCAL substitution — replaced at query time using ARP,
  # DHCP leases, and hosts files. It is never resolved via DNS. What bootstrap
  # servers resolve is the upstream SERVER hostname itself (e.g. *.controld.com),
  # which maps to the same IPs regardless of the per-device prefix in front of it.
  #
  # For DoT/DoQ with {client-name} IN THE HOSTNAME: the hostname cannot be
  # resolved at startup (it's still a template). Resolution happens lazily on
  # the first query for each unique expanded hostname, using bootstrap_servers
  # if configured, or the OS resolver as fallback. Results are cached for the
  # process lifetime. Per-URL bootstrap IPs still take precedence and skip
  # the lazy resolution entirely if you prefer explicit control.
  bootstrap_servers: []

logging:
  # Per-query logging — logs every DNS query with client IP, route, upstream, etc.
  # true  = log every query (default). false = suppress per-query lines.
  log_queries: true

  # strip_time removes the date/time prefix from log lines. Useful under
  # supervisors (systemd, procd) that add their own timestamps.
  strip_time: false

# QUERY-TYPE POLICY
# Maps specific DNS RR query types to an immediate RCODE.
# Fired at step 0 in ProcessDNS — before cache, identity, DDR, and upstream.
rtype_policy:
  ANY:   "REFUSED"   # RFC 8482 — amplification vector
  AXFR:  "REFUSED"   # Zone transfers not valid on a forwarding resolver
  IXFR:  "REFUSED"   # Same rationale as AXFR
  HINFO: "NOTIMP"    # Historical record, no modern use case

# DOMAIN POLICY
# Maps domain suffixes to an immediate RCODE — no upstream forwarding.
# A single entry covers the apex AND all sub-domains.
# Fired at step 0d — after qtype checks but before DDR, identity, and routing.
# IMPORTANT: domain_policy fires BEFORE domain_routes. Don't add zones here
# that are also in domain_routes — the block wins and routing never fires.
domain_policy:
  "onion":         "NXDOMAIN"   # RFC 7686 — Tor hidden services
  "local":         "NXDOMAIN"   # RFC 6762 — mDNS (use domain_routes for LAN zones)
  "localhost":     "NXDOMAIN"   # RFC 6761
  "invalid":       "NXDOMAIN"   # RFC 6761
  "example":       "NXDOMAIN"   # RFC 2606
  "example.com":   "NXDOMAIN"   # RFC 2606
  "example.net":   "NXDOMAIN"   # RFC 2606
  "example.org":   "NXDOMAIN"   # RFC 2606
  "test":          "NXDOMAIN"   # RFC 6761

# UPSTREAM GROUPS
# The "default" group is required — all other groups are optional.
#
# PROTOCOL SCHEMES
#   udp://host:port   Plain DNS over UDP (RFC 1035). Default port: 53.
#   tcp://host:port   Plain DNS over TCP (RFC 1035). Default port: 53.
#   dot://host:port   DNS over TLS — RFC 7858. Default port: 853.
#   doh://host/path   DNS over HTTPS/2 with HTTP/1.1 fallback — RFC 8484.
#   doh3://host/path  DNS over HTTP/3 / QUIC.
#   doq://host:port   DNS over QUIC — RFC 9250. Default port: 853.
#
# PER-URL BOOTSTRAP IPs  (appended after #, comma-separated)
#   Bypasses DNS for the upstream hostname itself. Always takes precedence
#   over bootstrap_servers above. Required for {client-name} in hostnames.
#   Syntax:  "scheme://host/path#ip1,ip2"
#
# PRIVACY NOTE
#   All outgoing queries have EDNS0 options stripped (removes ECS, cookies, etc.).
#   Encrypted upstreams additionally get RFC 7830/8467 padding applied.
#   UDP payload size is always normalised to 4096 bytes before forwarding.
#
upstreams:
  default:
    - "udp://1.1.1.1:53"
    # Cloudflare DoH — hostname resolved via bootstrap_servers if configured,
    # or via per-URL IPs if you prefer explicit control:
    - "doh://cloudflare-dns.com/dns-query#1.1.1.1,1.0.0.1"
  kids:
    - "tcp://1.1.1.3:53"
    - "doh://doh.controld.com/{client-name}#76.76.2.0,76.76.10.0"
  secure:
    - "dot://dns.quad9.net:853#9.9.9.9,149.112.112.112"
    - "doh3://security.cloudflare-dns.com/dns-query#1.1.1.2,1.0.0.2"
  local_network:
    - "udp://192.168.1.1:53"

# MAC-BASED ROUTES
routes:
  "00:11:22:33:44:55":
    upstream: "kids"
    client_name: "kids-ipad-override"

# DOMAIN-BASED ROUTES
# Suffix matching checked before cache and upstream selection.
# NOTE: domain_policy is checked BEFORE domain_routes.
domain_routes:
  "lan":           "local_network"
  "home.arpa":     "local_network"
  "corp.internal": "local_network"

cache:
  enabled:  true
  size:     4096   # Maximum number of cached responses (LRU eviction)
  min_ttl:  60     # Floor TTL in seconds — prevents hammering for short-lived records
  max_ttl:  3600   # Ceiling TTL in seconds — 0 = unlimited

identity:
  # Hosts files to load for local A/AAAA/PTR resolution.
  hosts_files:
    - "/etc/hosts"

  # dnsmasq lease files for DHCP client name resolution.
  dnsmasq_leases:
    - "/var/lib/misc/dnsmasq.leases"

  # How often (seconds) to re-read identity files. 0 = once at startup only.
  poll_interval: 60

